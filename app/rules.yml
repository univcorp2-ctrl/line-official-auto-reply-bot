welcome_reply: "友だち追加ありがとうございます。ご用件をメッセージでお送りください。"
default_reply: "お問い合わせありがとうございます。内容を確認しました。担当者が必要な場合は順次対応します。"
handoff_reply: "お問い合わせありがとうございます。この内容は担当者が確認して対応します。少々お待ちください。"
handoff_keywords:
  - 担当者
  - 人に代わって
  - クレーム
  - 解約
  - 返金
  - 個人情報
keywords:
  - contains: 営業時間
    reply: "営業時間は平日10:00〜18:00です。土日祝は休業です。"
  - contains: 予約
    reply: "ご予約ありがとうございます。ご希望日時、お名前、人数を送ってください。担当者が確認します。"
  - contains: 料金
    reply: "料金についてのお問い合わせありがとうございます。ご希望のサービス名を送っていただければ、担当者が確認します。"
  - contains: アクセス
    reply: "アクセス情報をご案内します。最寄駅、駐車場の有無など、知りたい内容を送ってください。"
